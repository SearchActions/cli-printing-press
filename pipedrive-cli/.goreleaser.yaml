version: 2
project_name: pipedrive-cli
changelog:
  disable: true
builds:
  - id: pipedrive-cli
    main: ./cmd/pipedrive-cli
    binary: pipedrive-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/USER/pipedrive-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: pipedrive-cli
    repository:
      owner: USER
      name: homebrew-tap
    homepage: "https://github.com/USER/pipedrive-cli"
    description: ""
    install: |
      bin.install "pipedrive-cli"
