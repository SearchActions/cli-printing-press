version: 2
project_name: plaid-cli
changelog:
  disable: true
builds:
  - id: plaid-cli
    main: ./cmd/plaid-cli
    binary: plaid-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/USER/plaid-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: plaid-cli
    repository:
      owner: USER
      name: homebrew-tap
    homepage: "https://github.com/USER/plaid-cli"
    description: "The Plaid REST API. Please see https://plaid.com/docs/api for more details."
    install: |
      bin.install "plaid-cli"
